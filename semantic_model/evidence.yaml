version: 1

confidence_policy:
  user_confirmed:
    rank: 100
    description: 用户明确确认的事实。
  user_provided_sql:
    rank: 90
    description: 用户在对话中提供的 SQL，可作为指标、过滤和关系候选证据。
  source_declared_schema:
    rank: 85
    description: 外部数据源明确声明的表、字段、主键、软删除或枚举信息。
  source_declared_relationship:
    rank: 85
    description: 外部数据源明确声明的表关系或字段级外键映射。
  source_model_enum:
    rank: 85
    description: 外部表模型中声明的枚举字典值。
  database_foreign_key:
    rank: 85
    description: 数据库物理外键。若项目数据库很少使用物理外键，不要假设存在。
  xml_join:
    rank: 75
    description: XML SQL 中的 join/on 关系。
  annotation_select:
    rank: 70
    description: 注解 SQL 中的 join/on 关系。
  query_wrapper:
    rank: 60
    description: QueryWrapper、LambdaQueryWrapper、MD.query 等查询逻辑。
  service_assembly:
    rank: 55
    description: Service 层分批查询、IN 查询、组装逻辑。
  field_comment:
    rank: 45
    description: 字段注释，可作为实体字段或业务术语候选。
  repeated_sql_usage:
    rank: 45
    description: 历史 SQL 中反复出现的相同用法。
  field_name_guess:
    rank: 20
    description: 仅根据字段名猜测，不能作为 confirmed 事实。

evidence: {}

